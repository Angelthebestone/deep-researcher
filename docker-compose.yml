services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: vigilador-tecnologico:latest
    ports:
      - "8000:8000"
    volumes:
      - vigilador-data:/app/.vigilador_data
    environment:
      PYTHONUNBUFFERED: "1"

  dashboard-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api-gateway:8000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    depends_on:
      - api-gateway

volumes:
  vigilador-data:
