name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Run regression suite
        run: >
          python -m unittest
          tests.test_document_upload
          tests.test_document_analyze
          tests.test_document_analyze_stream
          tests.test_schema_contract_alignment
          tests.test_sse_stream
          tests.test_research_fallback
          tests.test_normalization_reporting
          tests.test_ingestion_persistence
          -v

      - name: Run Gemma smoke test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m unittest tests.test_gemma_smoke -v
